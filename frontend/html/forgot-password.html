<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AcaUni</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">AU</div>
      <div class="auth-titles">
        <h1>AcaUni</h1>
        <p>Recuperação de acesso</p>
      </div>
    </div>

    <p class="auth-intro">Informe o email associado à conta para iniciar a recuperação da palavra-passe.</p>
    <div class="alert" data-form-message hidden></div>

    <form class="auth-form" data-forgot-form>
      <label class="field">
        <span>Email</span>
        <input type="email" name="email" placeholder="utilizador@universidade.edu" required>
      </label>

      <button class="primary-button" type="submit">Enviar pedido</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">Voltar ao login</a>
    </div>
  </div>

  <script src="../js/app.js" defer></script>
</body>
</html>

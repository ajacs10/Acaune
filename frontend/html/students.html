<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AcaUni</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link href="../css/students.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="app-background"></div>
  <div class="app-layout">
    <aside class="sidebar" data-sidebar>
      <button class="sidebar-collapse" data-sidebar-collapse aria-label="Colapsar sidebar">◀</button>
      <div class="brand-mark"><div class="brand-icon">A</div><div><strong>AcaUni</strong><span>Sistema Académico</span></div></div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="../html/index.html"><span>Dashboard</span></a>
        <a class="sidebar-link is-active" href="students.html"><span>Estudantes</span></a>
        <a class="sidebar-link" href="enrollments.html"><span>Matrículas</span></a>
        <a class="sidebar-link" href="grades.html"><span>Notas</span></a>
        <a class="sidebar-link" href="reports.html"><span>Relatórios</span></a>
        <a class="sidebar-link" href="profile.html"><span>Perfil</span></a>
        <a class="sidebar-link" href="settings.html"><span>Configurações</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" data-sidebar-logout><span>⏻</span>Sair</button>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button class="icon-button mobile-trigger" type="button" aria-label="Abrir menu">☰</button>
        <div class="search-box"><span>⌕</span><input type="search" placeholder="Pesquisar"></div>
        <div class="topbar-actions"><div class="profile-chip"><div class="avatar-sm" data-current-user-avatar>U</div><div><strong data-current-user-name>Utilizador</strong><span data-current-user-role>Conta ativa</span></div></div></div>
      </header>
      <main class="page-content">
        <section class="glass-card table-card">
          <div class="card-head"><h3>Novo estudante</h3></div>
          <div class="alert" data-form-message hidden></div>
          <form class="student-form" data-student-form>
            <input class="input-control" name="full_name" placeholder="Nome completo" required>
            <input class="input-control" name="academic_number" placeholder="Nº académico" required>
            <input class="input-control" type="email" name="email" placeholder="Email institucional" required>
            <select class="input-control" name="course_id" data-course-select>
              <option value="">A carregar cursos...</option>
            </select>
            <button class="primary-button" type="submit">Registar estudante</button>
          </form>
        </section>

        <section class="glass-card table-card students-table-card"><div class="table-scroll students-table-scroll"><table class="premium-table"><thead><tr><th>Estudante</th><th>Nº Académico</th><th>Curso</th><th>Estado</th><th>Ações</th></tr></thead><tbody data-students-table>
          <tr><td colspan="5" class="empty-state">A carregar estudantes...</td></tr>
        </tbody></table></div></section>
      </main>
    </div>
  </div>
  <script src="../js/app.js" defer></script>
</body>
</html>

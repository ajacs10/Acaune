<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AcaUni</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link href="../css/profile.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="app-background"></div>
  <div class="app-layout">
    <aside class="sidebar" data-sidebar>
      <button class="sidebar-collapse" data-sidebar-collapse aria-label="Colapsar sidebar">◀</button>
      <div class="brand-mark"><div class="brand-icon">A</div><div><strong>AcaUni</strong><span>Sistema Académico</span></div></div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="index.html"><span>Dashboard</span></a>
        <a class="sidebar-link" href="students.html"><span>Estudantes</span></a>
        <a class="sidebar-link" href="enrollments.html"><span>Matrículas</span></a>
        <a class="sidebar-link" href="grades.html"><span>Notas</span></a>
        <a class="sidebar-link" href="reports.html"><span>Relatórios</span></a>
        <a class="sidebar-link is-active" href="profile.html"><span>Perfil</span></a>
        <a class="sidebar-link" href="settings.html"><span>Configurações</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" data-sidebar-logout>
          <span aria-hidden="true">⏻</span>
          <span class="sidebar-logout-label">Sair</span>
        </button>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button class="icon-button mobile-trigger" type="button" aria-label="Abrir menu">☰</button>
        <div class="search-box"><span>⌕</span><input type="search" placeholder="Pesquisar perfil"></div>
        <div class="topbar-actions"><div class="profile-chip"><div class="avatar-sm" data-current-user-avatar>U</div><div><strong data-current-user-name>Utilizador</strong><span data-current-user-role>Conta ativa</span></div></div></div>
      </header>
      <main class="page-content">
        <section class="profile-grid">
          <article class="glass-card profile-card">
            <div class="profile-avatar" id="userAvatar">--</div>
            <h2 id="userName">Utilizador</h2>
            <p id="userAcademic" style="color: var(--muted);">--</p>
            <span class="status-pill status-active" id="userStatus">Ativo</span>
            <ul class="profile-meta" id="userMeta">
              <li id="userCourse">--</li>
              <li id="userEmail">--</li>
              <li id="userPhone">--</li>
              <li id="userLocation">--</li>
            </ul>
          </article>
          
          <article class="glass-card profile-main" data-collapsible>
            <div class="card-head"><h3>Resumo académico</h3><span id="userProgress">0% concluído</span></div>
            <div class="card-body" data-card-body>
              <div class="progress-block"><div class="progress-bar"><span id="progressBar" style="width:0%"></span></div></div>
              <div class="profile-stats">
                <div><strong id="userAverage">0.0</strong><span>Média Geral</span></div>
                <div><strong id="userYear">--</strong><span>Ano atual</span></div>
                <div><strong id="userECTS">0 ECTS</strong><span>Progresso</span></div>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script src="../js/app.js" defer></script>
</body>
</html>
